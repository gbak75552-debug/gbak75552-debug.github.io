<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Controle Financeiro</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    padding: 20px;
    max-width: 600px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.income { color: #22c55e; }
.expense { color: #ef4444; }

.list-item {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    border-bottom: 1px solid #334155;
    padding-bottom: 5px;
}
</style>
</head>

<body>

<header>💰 Meu Controle Financeiro</header>

<div class="container">

    <div class="card">
        <h3>Saldo Atual</h3>
        <h1 id="balance">R$ 0.00</h1>
    </div>

    <div class="card">
        <h3>Adicionar Transação</h3>
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="value" placeholder="Valor">
        
        <select id="type">
            <option value="income">Receita</option>
            <option value="expense">Despesa</option>
        </select>

        <button onclick="addTransaction()">Adicionar</button>
    </div>

    <div class="card">
        <h3>Histórico</h3>
        <div id="list"></div>
    </div>

    <!-- Área de anúncio -->
    <div class="card">
        <h3>Anúncio</h3>

        <!-- COLOQUE SEU SCRIPT AQUI -->
        <!-- Exemplo -->
        <!--
        <script src="SEU_SCRIPT_AQUI.js"></script>
        -->

    </div>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

function updateUI() {
    let list = document.getElementById("list");
    let balance = document.getElementById("balance");

    list.innerHTML = "";

    let total = 0;

    transactions.forEach((t, index) => {
        let div = document.createElement("div");
        div.classList.add("list-item");

        let valueClass = t.type === "income" ? "income" : "expense";

        div.innerHTML = `
            <span>${t.desc}</span>
            <span class="${valueClass}">R$ ${t.value}</span>
        `;

        list.appendChild(div);

        total += t.type === "income" ? t.value : -t.value;
    });

    balance.innerText = "R$ " + total.toFixed(2);

    localStorage.setItem("transactions", JSON.stringify(transactions));
}

function addTransaction() {
    let desc = document.getElementById("desc").value;
    let value = parseFloat(document.getElementById("value").value);
    let type = document.getElementById("type").value;

    if (!desc || !value) {
        alert("Preencha tudo!");
        return;
    }

    transactions.push({ desc, value, type });

    document.getElementById("desc").value = "";
    document.getElementById("value").value = "";

    updateUI();
}

updateUI();
</script>

</body>
</html>
